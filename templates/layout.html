<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Restaurant Adventure</title>
    <!-- O url_for garante que os ficheiros estáticos são sempre encontrados -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/style.css') }}">
    <script src="{{ url_for('static', filename='scripts/main.js') }}" defer></script>
</head>
<body>
    <header>
        <nav class="navbar" aria-label="main navigation">
            <ul>
                <!-- Lógica de menu baseada na autenticação -->
                {% if not current_user.is_authenticated %}
                    <li><a class="button is-link" href="{{ url_for('login_page') }}">Log in</a></li>
                    <li><a class="button is-link" href="{{ url_for('register_page') }}">Registo</a></li>
                {% else %}
                    <li><span class="navbar-item">Bem-vindo, {{ current_user.username }}!</span></li>
                    <li><a class="button is-link" href="{{ url_for('dashboard_page') }}">O Meu Império</a></li>
                    <li><a class="button is-link" href="{{ url_for('logout_page') }}">Log out</a></li>
                {% endif %}
            </ul>
        </nav>
        {% block title %}{% endblock %}
    </header>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer">
        <!-- O símbolo &copy; é uma entidade HTML para o símbolo de copyright -->
        <p>Copyright &copy; 2026. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
