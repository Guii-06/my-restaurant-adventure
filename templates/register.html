<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Registo - My Restaurant Adventure</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/style.css') }}">
</head>
<body>
    <div class="auth-page">
        <form class="auth-card" method="POST">
            <h1>My Restaurant<br><span>Adventure</span></h1>

            <h2>Criar Conta</h2>
            <!-- Shows register validation errors -->
            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}
            <!-- Username used to identify the player account -->
            <label>Username</label>
            <input type="text" name="username" required>

            <!-- Email used for the player account -->
            <label>Email</label>
            <input type="email" name="email" required>

            <!-- Password used to protect the account -->
            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Registar</button>

            <p>
                Já tens conta?
                <a href="{{ url_for('login_page') }}">Login</a>
            </p>
        </form>
    </div>
</body>
</html>
